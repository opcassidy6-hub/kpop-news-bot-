name: kpop-news-bot

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kpop-news-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run bot
        env:
          BLUESKY_HANDLE: "knews00.bsky.social"
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          NEWS_QUERY: "K-POP OR 韓流"
          MAX_POSTS_PER_RUN: "5"
        run: python kpop_news_bot.py

      - name: Persist dedup state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.json
          git diff --staged --quiet && echo "no state change" || (git commit -m "chore: update posted state" && git push)
